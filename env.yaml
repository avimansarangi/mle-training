name: ml-workflow-env

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.9
  - pip

  - numpy
  - pandas
  - scikit-learn
  - scipy
  - pyyaml
  - tqdm

  - loguru

  - pytest
  - pytest-cov

  - sphinx
  - sphinx-rtd-theme
  - numpydoc

  - setuptools
  - wheel

  - pip:
      - black
      - flake8
